<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カルテチェックPro+</title>

<style>
body {
  font-family: sans-serif;
  background:#f9fafb;
  padding:10px;
  font-size:16px;
}

h2 { text-align:center; }

.tab button {
  padding:10px;
  margin:3px;
  border:none;
  border-radius:10px;
  background:#ddd;
}

.card {
  background:white;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.high { border-left:6px solid #ff6b6b;}
.mid { border-left:6px solid #f7b731;}
.low { border-left:6px solid #2ecc71;}

input, textarea, select {
  width:100%;
  margin:5px 0;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:5px;
}

.deleteBtn { background:#ff6b6b; color:white;}
.saveBtn { background:#4dabf7; color:white;}

.dayBox {
  display:inline-block;
  width:45px;
}
</style>
</head>

<body>

<h2>カルテチェックPro+</h2>

<div class="tab">
<button onclick="showTab('daily')">日次</button>
<button onclick="showTab('list')">一覧</button>
<button onclick="showTab('check')">チェック</button>
<button onclick="showTab('stats')">統計</button>
</div>

<!-- 日次 -->
<div id="dailyTab">
<input id="d_name" placeholder="患者名">
<input type="date" id="d_date">
<input id="d_nurse" placeholder="看護師">

<select id="priority">
<option value="low">通常</option>
<option value="mid">注意</option>
<option value="high">緊急</option>
</select>

<textarea id="d_check" placeholder="チェック項目"></textarea>
<textarea id="d_progress" placeholder="経過"></textarea>

<label><input type="checkbox" id="d_contacted"> 修正連絡済</label>
<label><input type="checkbox" id="d_confirmed"> 修正確認済</label>
<label><input type="checkbox" id="d_with"> 同行</label>

<textarea id="d_note" placeholder="備考"></textarea>

<button class="saveBtn" onclick="saveDaily()">保存</button>
</div>

<!-- 一覧 -->
<div id="listTab" style="display:none">
<input id="filterName" placeholder="患者検索" oninput="renderList()">
<div id="list"></div>
</div>

<!-- チェック -->
<div id="checkTab" style="display:none">
<input id="c_name" placeholder="患者名">
<input type="month" id="c_month">
<button onclick="renderCheck()">表示</button>
<div id="checkList"></div>
</div>

<!-- 統計 -->
<div id="statsTab" style="display:none">
<h3>チェック漏れ統計</h3>
<button onclick="renderStats()">更新</button>
<div id="stats"></div>
</div>

<script>
let dailyData = JSON.parse(localStorage.getItem("dailyData")) || [];

// タブ
function showTab(tab){
  dailyTab.style.display="none";
  listTab.style.display="none";
  checkTab.style.display="none";
  statsTab.style.display="none";

  if(tab==="daily") dailyTab.style.display="block";
  if(tab==="list"){ listTab.style.display="block"; renderList();}
  if(tab==="check") checkTab.style.display="block";
  if(tab==="stats"){ statsTab.style.display="block"; renderStats();}
}

// 日次保存
function saveDaily(){
  let now = new Date();

  let data={
    id: Date.now(),
    name:d_name.value,
    date:d_date.value,
    nurse:d_nurse.value,
    priority:priority.value,
    check:d_check.value,
    progress:d_progress.value,
    contacted:d_contacted.checked,
    confirmed:d_confirmed.checked,
    with:d_with.checked,
    note:d_note.value,
    savedAt: now.toLocaleString()
  };

  dailyData.push(data);
  localStorage.setItem("dailyData", JSON.stringify(dailyData));

  // 月チェック自動反映
  let day = new Date(d_date.value).getDate();
  let key = `${d_name.value}_${d_date.value.slice(0,7)}`;
  let saved = JSON.parse(localStorage.getItem("dayCheck")) || {};
  if(!saved[key]) saved[key]=[];
  if(!saved[key].includes(day)) saved[key].push(day);
  localStorage.setItem("dayCheck", JSON.stringify(saved));

  alert("保存OK");
}

// 一覧
function renderList(){
  let list=document.getElementById("list");
  list.innerHTML="";

  dailyData.forEach((d,i)=>{
    list.innerHTML+=`
    <div class="card ${d.priority}">
    <b>${d.name}</b> (${d.date})<br>
    👩‍⚕️${d.nurse}<br>
    🕒${d.savedAt}<br><br>

    <button class="deleteBtn" onclick="deleteDaily(${i})">削除</button>
    </div>`;
  });
}

function deleteDaily(i){
  if(confirm("削除する？")){
    dailyData.splice(i,1);
    localStorage.setItem("dailyData", JSON.stringify(dailyData));
    renderList();
  }
}

// チェック表示
function renderCheck(){
  let name=c_name.value;
  let month=c_month.value;
  let key=`${name}_${month}`;
  let saved = JSON.parse(localStorage.getItem("dayCheck")) || {};
  let checked = saved[key] || [];

  let html="<h3>"+month+"</h3>";

  for(let i=1;i<=31;i++){
    let isChecked = checked.includes(i) ? "checked":"";
    html+=`
    <label class="dayBox">
    <input type="checkbox" ${isChecked}
    onchange="toggleDay('${key}',${i},this)">
    ${i}
    </label>`;
  }

  checkList.innerHTML=html;
}

function toggleDay(key,day,el){
  let saved = JSON.parse(localStorage.getItem("dayCheck")) || {};
  if(!saved[key]) saved[key]=[];

  if(el.checked){
    saved[key].push(day);
  }else{
    saved[key]=saved[key].filter(d=>d!==day);
  }

  localStorage.setItem("dayCheck", JSON.stringify(saved));
}

// 🔥統計
function renderStats(){
  let stats={};

  dailyData.forEach(d=>{
    if(!stats[d.name]){
      stats[d.name]={
        total:0,
        contactMiss:0,
        confirmMiss:0,
        withMiss:0
      };
    }

    stats[d.name].total++;

    if(!d.contacted) stats[d.name].contactMiss++;
    if(!d.confirmed) stats[d.name].confirmMiss++;
    if(!d.with) stats[d.name].withMiss++;
  });

  let html="";

  for(let name in stats){
    let s=stats[name];

    html+=`
    <div class="card">
    <b>${name}</b><br>
    総件数：${s.total}<br>
    🔻連絡漏れ：${s.contactMiss}<br>
    🔻確認漏れ：${s.confirmMiss}<br>
    🔻同行漏れ：${s.withMiss}
    </div>`;
  }

  document.getElementById("stats").innerHTML=html;
}
</script>

</body>
</html>
